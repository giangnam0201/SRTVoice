name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Generate platform files
        run: |
          rm -rf web
          flutter create --project-name srt_voice --org com.srtvoice --platforms web .

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/SRTVoice/"

      - name: Archive web build
        run: |
          cd build/web
          zip -r ../../srt-voice-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: srt-voice-web.zip

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Generate platform files
        run: |
          flutter create --project-name srt_voice --org com.srtvoice --platforms android .

      - name: Update Kotlin version, compileSdk and minSdk
        run: |
          # Handle both .gradle and .gradle.kts formats
          if [ -f android/settings.gradle.kts ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "2.1.0"/' android/settings.gradle.kts
          elif [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.1.0"/' android/settings.gradle
          fi
          # Update compileSdk and minSdk
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle.kts
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' android/app/build.gradle
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Generate platform files
        run: flutter create --project-name srt_voice --org com.srtvoice --platforms windows .

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath srt-voice-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: srt-voice-windows.zip

  create-release:
    needs: [build-web, build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SRT Voice v1.0.${{ github.run_number }}"
          body: |
            ## SRT Voice Release

            Convert subtitle files (.srt) to speech audio with correct timing.

            ### Features:
            - Load .srt subtitle files
            - Translate subtitles between 30+ languages using MyMemory API
            - Choose voice language and voice type from device's available voices
            - Adjust speech rate to match subtitle timing exactly
            - Generate MP3/WAV with correct subtitle timing
            - Multi-platform: Web, Android, Windows
            - Multi-threaded batch processing for fast generation

            ### Downloads:
            - **Web**: srt-voice-web.zip (deploy to any web server)
            - **Android**: app-release.apk (install directly on Android)
            - **Windows**: srt-voice-windows.zip (extract and run)

            ### Web App (GitHub Pages):
            https://giangnam0201.github.io/SRTVoice/
          files: |
            artifacts/web-build/srt-voice-web.zip
            artifacts/android-build/app-release.apk
            artifacts/windows-build/srt-voice-windows.zip
          draft: false
          prerelease: false
